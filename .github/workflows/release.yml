name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  # Gate: all quality checks must pass before release
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint check
        run: npm run lint:check

      - name: Prettier check
        run: npm run prettier:check

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  # Security: verify no known vulnerabilities
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

  # Release: semantic-release with npm Trusted Publishing (OIDC)
  release:
    name: Automated Release
    runs-on: ubuntu-latest
    needs: [quality-gate, security-audit]
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Update npm to latest version
        run: npm install -g npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify package contents
        run: |
          npm pack --dry-run
          echo "=== Files that will be published ==="
          npm pack --dry-run 2>&1 | grep -E '^\s+\d+' || true

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: npx semantic-release

      - name: Check for tarball
        id: check-tarball
        if: success()
        run: |
          if ls dist-tarball/*.tgz 1> /dev/null 2>&1; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "✅ Tarball found in dist-tarball/"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No tarball found (no release created)"
          fi

      - name: Generate provenance attestation
        if: success() && steps.check-tarball.outputs.found == 'true'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'dist-tarball/*.tgz'
