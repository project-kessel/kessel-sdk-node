name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  # Gate: all quality checks must pass before release
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint check
        run: npm run lint:check

      - name: Prettier check
        run: npm run prettier:check

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  # Security: verify no known vulnerabilities
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

  # Release: semantic-release with npm Trusted Publishing (OIDC)
  release:
    name: Automated Release
    runs-on: ubuntu-latest
    needs: [quality-gate, security-audit]
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Update npm to latest version
        run: npm install -g npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify package contents
        run: |
          npm pack --dry-run
          echo "=== Files that will be published ==="
          npm pack --dry-run 2>&1 | grep -E '^\s+\d+' || true

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: npx semantic-release

      - name: Generate provenance attestation
        if: success()
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'dist-tarball/*.tgz'
